<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <center>
        <h1>Registration Form</h1>
    <form action="./login.html">
        <input type="text" required placeholder="Enter Your Name" /> Enter Your Name
        <br/>
        <br/>
        <input type="email" required placeholder="Enter Your Email" /> Enter Your Email
        <br />
        <br />
        <input type="password" required placeholder="Enter Your Password" /> Enter Your Password
        <br />
        <br />
        <input type="password" required placeholder="Confirm Your Password" /> Confirm Your Password
        <br />
        <br />
        <input type="number" required placeholder="Enter Your Mobile Number" /> Enter Your Mobile Number
        <br />
        <br />
        <p>Enter Your Gender:</p>
        <input type="radio" name="gender" value="male" /> Male
        <input type="radio" name="gender" value="female" /> Female
        <br />
        <br />
        <p>Enter Your Qualification:</p>
        <input type="checkbox" />10th
        <input type="checkbox" />12th
        <input type="checkbox" />Diploma
        <input type="checkbox" />B.Tech
        <br />
        <br />
        <p>Upload Your Profile Picture:</p>
        <input type="file" required />
        <br />
        <br/>
        <p>Enter Your Date of Birth</p>
        <input type="date" required /> 
        <br />
        <br />
        <button >Register</button>
    </form>
    </center>
</body>

</html>
